    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd86b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffd86b" stop-opacity="0"/>
