  <path d="M214,58 l4,10 l10,4 l-10,4 l-4,10 l-4,-10 l-10,-4 l10,-4 Z" fill="#cfe3ff" opacity="0.85"/>
  <path d="M196,168 l3,7 l7,3 l-7,3 l-3,7 l-3,-7 l-7,-3 l7,-3 Z" fill="#cfe3ff" opacity="0.6"/>

  <!-- texto -->
  <text x="250" y="108" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="62" font-weight="700" fill="#f5f7fb">lodestar</text>
  <text x="252" y="146" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#8aa0c8">Spec-Driven Development &#183; siga a spec, n&#227;o o caos</text>
  <text x="252" y="178" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" fill="#5f7099">plugin pro Claude Code &#183; PT-BR &#183; adaptativo (N1&#8594;N3)</text>
