<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="estrela-guia piscando">
  <defs>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cfeaff" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#7fc1ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7fc1ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="star" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#bfe3ff"/>
    </linearGradient>
  </defs>

  <!-- halo que pulsa (a "luz piscando") -->
  <circle cx="100" cy="100" r="80" fill="url(#halo)">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="74;86;74" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- raios em cruz que respiram -->
  <g stroke="#eaf6ff" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <line x1="100" y1="26" x2="100" y2="174"/>
    <line x1="26" y1="100" x2="174" y2="100"/>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="28s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0.7;0.25" dur="3.1s" repeatCount="indefinite"/>
  </g>

  <!-- estrela de 4 pontas (a lodestar) -->
  <path d="M100,40 L116,84 L160,100 L116,116 L100,160 L84,116 L40,100 L84,84 Z"
        fill="url(#star)" stroke="#dff0ff" stroke-width="1.5" stroke-linejoin="round">
    <animateTransform attributeName="transform" type="scale" additive="sum"
                      values="1;1.06;1" dur="2.4s" repeatCount="indefinite"
                      calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- nucleo que pisca -->
  <circle cx="100" cy="100" r="11" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.45;1" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="9;13;9" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- sparkles cintilando (defasados) -->
  <g fill="#ffffff">
    <path d="M150,52 l3,8 l8,3 l-8,3 l-3,8 l-3,-8 l-8,-3 l8,-3 Z">
      <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path d="M48,150 l2.5,6 l6,2.5 l-6,2.5 l-2.5,6 l-2.5,-6 l-6,-2.5 l6,-2.5 Z">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" begin="0.7s" repeatCount="indefinite"/>
    </path>
    <path d="M158,140 l2,5 l5,2 l-5,2 l-2,5 l-2,-5 l-5,-2 l5,-2 Z">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="1.1s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
